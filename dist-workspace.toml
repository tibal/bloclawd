[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.31.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "homebrew"]
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-musl"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Where to host releases
hosting = "github"
# Whether to install an updater program
install-updater = false
# NOTE: `tag-namespace` is intentionally OMITTED. In cargo-dist 0.31.0 setting it to
# `""` generates a workflow file named `-release.yml` (literal dash prefix), which is
# not what we want. The default (no tag-namespace) accepts plain `vX.Y.Z` tags and
# produces `release.yml` — exactly the DIST-01 / D-113 contract.
# A GitHub repo to push Homebrew formulas to
tap = "bloclawd/homebrew-tap"
# Which actions to run on pull requests
pr-run-mode = "plan"
# Publish jobs to run in CI
publish-jobs = ["homebrew"]
# Whether to sign macOS executables
macos-sign = true
# Whether CI should trigger releases with dispatches instead of tag pushes
dispatch-releases = false
# release.yml contains hand-edits that cargo-dist doesn't template:
# the `update-install-sh` job (post-publish auto-merge PR that overwrites
# apps/frontend/public/install.sh with the real cargo-dist installer
# baked with sha256 hashes per release; see D-122). `allow-dirty = ["ci"]`
# tells `dist plan` to skip the workflow-drift check so PR CI passes.
allow-dirty = ["ci"]
