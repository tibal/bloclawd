# Pinned 2026-04-30: workers-rs 0.8.1 Rust-to-WASM build pipeline; no Node compatibility flag needed.
name = "bloclawd-worker"
compatibility_date = "2026-04-01"
main = "build/worker/shim.mjs"

[build]
# --locked: respect worker-build's published Cargo.lock so cargo doesn't
# resolve transitive deps (e.g. `time`) to versions requiring a newer
# rustc than the one pinned in rust-toolchain.toml. Without --locked the
# CI install fails on bumped MSRV from time@0.3.47.
command = "cargo install -q worker-build@0.8.1 --locked && worker-build --release"

[placement]
mode = "smart"

# Cron triggers require the Workers Paid subscription ($5/mo).
# Free tier caps cron CPU at 10ms - insufficient for aggregation + R2 writes.
# See apps/worker/README.md "Cloudflare Workers Paid subscription requirement".
[triggers]
crons = ["*/15 * * * *"]   # 15-minute ticks for `wrangler dev` defaults (matches production cadence)

# Top-level dev defaults (only used by `wrangler dev`). Real deploys go through
# `wrangler deploy --env staging` / `wrangler deploy --env production`.
[[hyperdrive]]
binding = "DB"
id = "4d7287b7f8194d96a0a95163a29c0134"
localConnectionString = "postgres://localhost:5432/bloclawd_dev"

# ---------- staging ----------
# Deploy: wrangler deploy --env staging
# PlanetScale branch: staging
# Worker URL: api-staging.bloclawd.com (custom domain; behind Cloudflare Access)
# workers_dev = false kills the public *.workers.dev preview URL so the only
# reachable hostname is api-staging.bloclawd.com, which is then policy-gated
# by the Access application. See docs/STAGING-ACCESS.md.
[env.staging]
name = "bloclawd-worker-staging"
workers_dev = false

[[env.staging.hyperdrive]]
binding = "DB"
id = "4d7287b7f8194d96a0a95163a29c0134"
localConnectionString = "postgres://localhost:5432/bloclawd_dev"

[[env.staging.r2_buckets]]
binding = "BUCKET"
bucket_name = "bloclawd-reports-staging"
preview_bucket_name = "bloclawd-reports-staging"

[env.staging.triggers]
crons = ["*/15 * * * *"]   # 15-min ticks for staging validation

[[env.staging.ratelimits]]
name = "RL_CHALLENGE"
namespace_id = "1001"

  [env.staging.ratelimits.simple]
  limit = 10
  period = 60

[[env.staging.ratelimits]]
name = "RL_EVENT"
namespace_id = "1002"

  [env.staging.ratelimits.simple]
  # One CLI submission posts one event per observed model. Keep this above the
  # current max supported model count while still blocking tight loops.
  limit = 10
  period = 60

# Custom-domain attach for staging. Pre-existing CNAME for
# api-staging.bloclawd.com MUST be deleted before first deploy or the
# attach fails (same trap as prod; see docs/STAGING-ACCESS.md preflight).
[[env.staging.routes]]
pattern = "api-staging.bloclawd.com"
custom_domain = true

# ---------- production ----------
# Deploy: wrangler deploy --env production
# PlanetScale branch: main
# Worker URL: bloclawd-worker.<account>.workers.dev (custom domain: api.bloclawd.com)
# IMPORTANT: replace the production Hyperdrive placeholder before first production deploy.
# See apps/worker/README.md section "Production Hyperdrive setup".
[env.production]
name = "bloclawd-worker"

[[env.production.hyperdrive]]
binding = "DB"
id = "9e97e64d73c945cab3548a0dceb05c4b"
localConnectionString = "postgres://localhost:5432/bloclawd_dev"

[[env.production.r2_buckets]]
binding = "BUCKET"
bucket_name = "bloclawd-reports"

[env.production.triggers]
crons = ["*/15 * * * *"]   # 15-minute ticks; v1 cadence

[[env.production.ratelimits]]
name = "RL_CHALLENGE"
namespace_id = "2001"

  [env.production.ratelimits.simple]
  limit = 10
  period = 60

[[env.production.ratelimits]]
name = "RL_EVENT"
namespace_id = "2002"

  [env.production.ratelimits.simple]
  # One CLI submission posts one event per observed model. Keep this above the
  # current max supported model count while still blocking tight loops.
  limit = 10
  period = 60

# Custom-domain attach (DIST-07). Cloudflare auto-creates the proxied
# DNS record + edge cert on `wrangler deploy --env production`.
# Pre-existing CNAME records for api.bloclawd.com MUST be deleted
# before deploy or the attach fails — operator handles in
# docs/RELEASE.md cutover sequence (plan 05-14).
[[env.production.routes]]
pattern = "api.bloclawd.com"
custom_domain = true
