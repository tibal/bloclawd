# Frontend Worker - static assets only; no Hyperdrive, no PoW, no cron.
# Independent deploy from apps/worker; custom domains attach outside this file.
name = "bloclawd-frontend"
compatibility_date = "2026-04-01"
main = "worker/index.ts"

[assets]
directory = "./dist/client"
not_found_handling = "single-page-application"
binding = "ASSETS"
run_worker_first = true

[placement]
mode = "smart"

# Staging is policy-gated by Cloudflare Access on staging.bloclawd.com.
# workers_dev = false kills the public *.workers.dev preview URL so the
# only reachable hostname is the custom-domain one, which Access then
# requires authentication for. See docs/STAGING-ACCESS.md.
[env.staging]
name = "bloclawd-frontend-staging"
workers_dev = false

[env.staging.assets]
directory = "./dist/client"
not_found_handling = "single-page-application"
binding = "ASSETS"
run_worker_first = true

# Custom-domain attach for staging. Pre-existing CNAME for
# staging.bloclawd.com MUST be deleted before first deploy or the
# attach fails. See docs/STAGING-ACCESS.md preflight.
[[env.staging.routes]]
pattern = "staging.bloclawd.com"
custom_domain = true

[env.production]
name = "bloclawd-frontend"

[env.production.assets]
directory = "./dist/client"
not_found_handling = "single-page-application"
binding = "ASSETS"
run_worker_first = true

# Custom-domain attach (DIST-07). Cloudflare auto-creates the proxied
# DNS record + edge cert on `wrangler deploy --env production`.
# Pre-existing CNAME records for these names MUST be deleted before
# deploy or the attach fails — operator handles this in docs/RELEASE.md
# cutover sequence (plan 05-14).
[[env.production.routes]]
pattern = "bloclawd.com"
custom_domain = true

[[env.production.routes]]
pattern = "www.bloclawd.com"
custom_domain = true
